server:
  port: 8090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: clientes
          uri: http://localhost:8081
          predicates:
            - Path=/api/clientes/**

        - id: productos
          uri: http://localhost:8082
          predicates:
            - Path=/api/productos/**

        - id: inventario
          uri: http://localhost:8083
          predicates:
            - Path=/api/inventario/**

        - id: pedidos
          uri: http://localhost:8084
          predicates:
            - Path=/api/pedidos/**

        - id: proveedores
          uri: http://localhost:8085
          predicates:
            - Path=/api/proveedores/**

        - id: ventas
          uri: http://localhost:8086
          predicates:
            - Path=/api/ventas/**

management:
  endpoints:
    web:
      exposure:
        include: "*"