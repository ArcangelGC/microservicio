spring.application.name=servicio-inventario

# Puerto del microservicio
server.port=8083

# MySQL (MISMO puerto 3306 que los demás)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bd_inventario?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# URLs de otros servicios
app.clientes-url=http://localhost:8081
app.productos-url=http://localhost:8082
app.inventario-url=http://localhost:8083
app.pedidos-url=http://localhost:8084
app.proveedores-url=http://localhost:8085
app.ventas-url=http://localhost:8086